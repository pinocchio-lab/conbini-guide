<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Best Convenience Store Food in Japan for Tourists</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      text-align: center;
    }
    h1 {
      font-size: 24px;
    }
    button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #007BFF;
      color: white;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🍱 Japan Convenience Store Food Guide</h1>
<p><b>For tourists in Japan:</b> You can pay with cash or card, and staff can heat your food. No Japanese needed.</p>
<p>Choose your goal:</p>

<button onclick="showResult('healthy')">Healthy</button>
<button onclick="showResult('cheap')">Cheap</button>
<button onclick="showResult('protein')">High Protein</button>

<div id="result"></div>
<p><a href="healthy-7eleven.html">👉 Healthy 7-Eleven Guide</a></p>
<script>
function showResult(type) {
  let content = "";

  if (type === "healthy") {
  content = `
    <h2>Healthy Option</h2>
    <p>🥗 Salad + 🐔 Salad Chicken (near drinks section) + 🍙 Rice Ball (Onigiri)</p>
    <p><b>Why this works:</b> Low fat, balanced, easy to find.</p>
    <p>Available at 7-Eleven, FamilyMart, Lawson</p>
  `;
  }
  if (type === "cheap") {
  content = `
    <h2>Budget Option (~500-600 yen)</h2>
    <p>🍙 Onigiri (Tuna Mayo, Salmon) + 🍜 Cup Soup</p>
    <p><b>Why this works:</b> No language needed, quick, cheap, and available 24/7.</p>
    <p>Available at 7-Eleven, FamilyMart, Lawson</p>
  `;
  }

  if (type === "protein") {
  content = `
    <h2>High Protein Option</h2>
    <p>🐔 Salad Chicken + 🥚 Boiled Eggs + 🥛 Protein Drink</p>
    <p><b>Why this works:</b> High protein, quick energy, easy to find.</p>
    <p>Available at 7-Eleven, FamilyMart, Lawson</p>
  `;
  }
  document.getElementById("result").innerHTML = content;
  window.scrollTo(0, document.body.scrollHeight);
}
</script>
<p><a href="cheap-meals.html">👉 Cheap Meals Guide</a></p>
</body>
</html>
