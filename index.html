<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏪 Conbini Guide for Tourists</title>
    <style>
        /* Nothing OS / Nexus思想を取り入れたモノトーン＆ミニマリズム */
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --accent-color: #ff3b30; /* 警告や重要なワンポイント用の赤 */
            --card-bg: #1a1a1a;
            --border-color: #2c2c2c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px; /* ナビ用の余白 */
            -webkit-font-smoothing: antialiased;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0 0 10px 0;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin: 0;
        }

        /* 観光客が10秒で探せるグリッドシステム */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            aspect-ratio: 1 / 1;
            transition: transform 0.1s ease;
        }

        .card:active {
            transform: scale(0.97); /* 物理的なボタンのようなクリック感 */
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.2;
        }

        /* 親指が届く、最下部固定の超実用的ゴールナビ */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background-color: rgba(26, 26, 26, 0.9);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-btn.active {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>CONBINI.GUIDE</h1>
        <p class="subtitle">Zero Japanese needed. Tap what you need instantly.</p>
    </header>

    <!-- ガイドメニューを「読むリンク」から「直感的に押せるカード」へ -->
    <main class="grid-container">
        <a href="#store-tips" class="card">
            <div class="card-icon">🏪</div>
            <div class="card-title">How to Use & Pay</div>
        </a>
        <a href="#breakfast" class="card">
            <div class="card-icon">☀️</div>
            <div class="card-title">7-Eleven Breakfast</div>
        </a>
        <a href="#healthy" class="card">
            <div class="card-icon">🥗</div>
            <div class="card-title">Healthy Food selection</div>
        </a>
        <a href="#cheap" class="card">
            <div class="card-icon">🪙</div>
            <div class="card-title">Budget Meals Guide</div>
        </a>
    </main>

    <!-- 画面を塞がず、いつでも切り替えられる目的別フィルター -->
    <nav class="bottom-nav">
        <a href="#all" class="nav-btn active">ALL</a>
        <a href="#healthy" class="nav-btn">🥗 HEALTHY</a>
        <a href="#cheap" class="nav-btn">🪙 CHEAP</a>
        <a href="#protein" class="nav-btn">💪 PROTEIN</a>
    </nav>

</body>
</html>
